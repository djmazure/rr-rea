# rr_rea — Requirements catalog (contract-first per ROUTERTL convention)
#
# Each REA-REQ-N below is referenced by exactly one cocotb test in
# sim/cocotb/tests/rea/test_*.py via @requires(REA-REQ-N). `rr sim coverage-map` enforces
# the mapping.
#
# kind:
#   behavioral — positive contract (this MUST happen)
#   negative   — explicit non-behavior (this MUST NOT happen — used to
#                pin the architectural fixes vs fcapz, e.g. REA-REQ-101)

ip: rr_rea_top
version: 0.1
hdl_file: rtl/rr_rea_top.vhd

functional_contract:

  # ── rr_rea_dpram (sample + timestamp BRAM) ────────────────────────
  - id: REA-REQ-200
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Module hierarchy" }]
    desc: >-
      Write/read same address (port A → port B) returns the same value
      on the next clk_b cycle (synchronous read).
  - id: REA-REQ-201
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Module hierarchy" }]
    desc: >-
      Concurrent write on port A and read on port B at DIFFERENT
      addresses do not collide; port B sees previously-written data.
  - id: REA-REQ-202
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Module hierarchy" }]
    desc: >-
      Generic WIDTH and DEPTH parameters drive the actual storage
      shape (verified by writing/reading at addr=DEPTH-1 and
      din=2^WIDTH-1).

  # ── rr_rea_jtag_iface (BSCAN protocol decoder) ────────────────────
  - id: REA-REQ-001
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mocking BSCAN" }]
    desc: >-
      Single register write opcode produces exactly one reg_wr_en
      pulse with reg_addr / reg_wdata carrying the values shifted in
      via tdi.
  - id: REA-REQ-002
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mocking BSCAN" }]
    desc: >-
      Single register read opcode latches the addressed value and
      shifts it out on TDO over the next 32 shift cycles.
  - id: REA-REQ-003
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mocking BSCAN" }]
    desc: >-
      N successive read scans each shift out their addressed reg_rdata
      via tdo without losing or aliasing values — the prerequisite for
      the host's read_block USER1 fallback path.

  # ── rr_rea_regbank (memory-mapped register file) ──────────────────
  - id: REA-REQ-010
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "SW Interface Contract (frozen — fcapz-compatible)" }]
    desc: >-
      Every RW register address round-trips an arbitrary 32-bit value
      (write then read returns the same value).
  - id: REA-REQ-011
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "SW Interface Contract (frozen — fcapz-compatible)" }]
    desc: >-
      STATUS register reflects its input wires (armed, triggered,
      done, overflow) combinationally.
  - id: REA-REQ-012
    kind: negative
    spec: [{ doc: SPEC.md, clause: "SW Interface Contract (frozen — fcapz-compatible)" }]
    desc: >-
      Write to a RO address is a no-op (no aliasing into a RW slot
      at the same low-order bits).
  - id: REA-REQ-013
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Wide trigger value/mask (`G_SAMPLE_W > 32`, RTL-P2.658)" }]
    desc: >-
      Wide trigger value/mask (G_SAMPLE_W > 32) are banked into
      ceil(G_SAMPLE_W/32) 32-bit words paged via TRIG_WORD_SEL (0x2C):
      with sel=k, a write/read of TRIG_VALUE/TRIG_MASK (0x24/0x28)
      targets word k, and the full value drives trig_value_out/
      trig_mask_out. sel resets to 0, so a G_SAMPLE_W<=32 core (or a
      host that never writes TRIG_WORD_SEL) is byte-identical to the
      legacy single-word path (RTL-P2.658).
  - id: REA-REQ-014
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Wide capture readback (`G_SAMPLE_W > 32`, RTL-P1.91)" }]
    desc: >-
      Wide capture data (G_SAMPLE_W > 32) is exposed through the frozen
      one-address-per-cell DATA_BASE window, paged independently by
      DATA_WORD_SEL (0xCC). Selector k returns sample bits
      [32*k+31:32*k], zero-padding a partial final word and returning zero
      for an out-of-range selector. The selector resets to 0, preserving
      byte-identical low-word readback for hosts that never write it.
  - id: REA-REQ-015
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Identity / content fingerprint (`FEATURES` 0xD0, `BUILD_ID` 0xD4, RTL-P3.1198)" }]
    desc: >-
      Identity/content fingerprint registers (RTL-P3.1198). FEATURES (0xD0,
      RO) packs the synth-time generics into a config fingerprint: bits[7:0]
      = G_TRIG_CONDS, bits[15:8] = G_NUM_SOURCE, bit[16] = '1' when
      G_SAMPLE_W > 32, bit[17] = wide-condition decode, and bit[18] = '1'
      when G_TIMESTAMP_W > 0. BUILD_ID (0xD4, RO)
      reads back the G_BUILD_ID generic verbatim (default 0 = not injected).
      Both are read-only: a write must not change them and must not alias
      into a RW slot.
  - id: REA-REQ-019
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "SW Interface Contract (frozen — fcapz-compatible)" }]
    desc: >-
      VERSION (0x00, RO) SHALL read the exact v0.7 feature-tier magic
      0x52454107. The value is a protocol discriminator, not an inferred
      string or a mutable register.
  - id: REA-REQ-022
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "SW Interface Contract (frozen — fcapz-compatible)" }]
    desc: >-
      CAPTURE_LEN (0x1C, RO) SHALL update combinationally from the current
      PRETRIG and POSTTRIG register values as PRETRIG + POSTTRIG + 1 using
      32-bit unsigned arithmetic; it does not require an arm or completed
      capture before reporting the configured window length.
  - id: REA-REQ-023
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "SW Interface Contract (frozen — fcapz-compatible)" }]
    desc: >-
      TIMESTAMP_W (0xC4, RO) SHALL report the exact G_TIMESTAMP_W synth-time
      generic. In v0.7 FEATURES[18] SHALL be set exactly when TIMESTAMP_W is
      nonzero; zero SHALL elaborate no timestamp storage plane.
  - id: REA-REQ-024
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Timestamp capture plane (RTL-T2.123)" }]
    desc: >-
      When G_TIMESTAMP_W > 0, each stored sample SHALL have a same-address,
      same-write-enable timestamp from a free-running sample-clock counter.
      DATA_PLANE_SEL=1 and DATA_WORD_SEL SHALL expose the full timestamp through
      DATA_BASE. Sample and timestamp readback SHALL remain aligned after the
      same START_PTR rotation across ring wrap and trigger.

  # ── Wide sample-width ceiling + wide conditions (RTL-P2.876/P2.895) ──
  - id: REA-REQ-016
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Wide sample-width ceiling + un-ignorable guard (RTL-P2.876/P2.895)" }]
    desc: >-
      Sample-width ceiling C_MAX_SAMPLE_W is 1024 bits (RTL-P2.876). A probe up
      to the ceiling (e.g. the field's 704-bit build) SHALL elaborate and the
      banked trigger value/mask SHALL page into ceil(G_SAMPLE_W/32) 32-bit words
      via TRIG_WORD_SEL, reassembling into the full-width `trig_value_out` —
      storage sized by the INSTANTIATED width, not the ceiling. The wide-sample
      FEATURES fingerprint stays set for any G_SAMPLE_W>32.
  - id: REA-REQ-017
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Wide comparator conditions — `field_lsb ≥ 256` (RTL-P2.876)" }]
    desc: >-
      Wide comparator conditions (RTL-P2.876). COND_CFG carries an 11-bit
      field_lsb {lsb_hi[30:28], lsb_lo[15:8]} (0..2047) so a per-condition
      comparator field can sit above bit 255. The regbank SHALL expand a slot
      with field_lsb>=256 into a full-width `cond_masks_out`/`cond_values_out`
      shifted to that offset, and the capture FSM SHALL assert `triggered` on a
      masked-field match at that high offset. The wide_cond FEATURES bit SHALL be
      '1' exactly when G_SAMPLE_W>256, advertising the extended decode; a
      field_lsb<256 stays byte-identical (lsb_hi=0).
  - id: REA-REQ-018
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Wide sample-width ceiling + un-ignorable guard (RTL-P2.876/P2.895)" }]
    desc: >-
      Un-ignorable over-ceiling guard (RTL-P2.895). A G_SAMPLE_W > C_MAX_SAMPLE_W
      instantiation SHALL fail ELABORATION in every tool via a static range
      violation (a `natural range 0 to 0` constant assigned boolean'pos of the
      over-ceiling test), not merely a runtime `assert severity failure` that
      vendor synthesis downgrades to a warning (the mechanism that shipped
      undefined out-of-ceiling silicon). The friendly assert also remains for a
      readable message. In-ceiling widths SHALL elaborate cleanly.

  # ── rr_rea_cdc (clock-domain crossings) ───────────────────────────
  - id: REA-REQ-020
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Module hierarchy" }]
    desc: >-
      Slow-changing config word toggled mid-cycle on the source clock
      settles on the destination clock within ≤2 dest-clock cycles
      with no metastable glitch.
  - id: REA-REQ-021
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Module hierarchy" }]
    desc: >-
      Toggle-pulse-encoded src_pulse event of N src_clk cycles produces
      exactly one dst_pulse on dst_clk.

  # ── rr_rea_capture_fsm (the heart) ────────────────────────────────
  - id: REA-REQ-100
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      wr_ptr advances every sample_clk cycle from reset deassertion,
      with armed=0. Sliding-window contract.
  - id: REA-REQ-101
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      arm_pulse does NOT reset wr_ptr; the buffer's pre-arm context
      is preserved across arm. Pins the architectural fix vs fcapz.
  - id: REA-REQ-102
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      When triggered asserts, trig_ptr_out captures wr_ptr_out at
      that same cycle (no off-by-N).
  - id: REA-REQ-103
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      dpram_addr at the cycle dpram_we is high carries the trigger
      sample value (probe_in & trig_mask) == (trig_value & trig_mask).
  - id: REA-REQ-104
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      When done asserts, start_ptr_out == (trig_ptr_out - pretrig)
      mod DEPTH.
  - id: REA-REQ-105
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      Reading DEPTH samples (snooped via dpram_we / dpram_addr /
      dpram_din) starting at start_ptr_out yields a time-monotonic
      sequence with no gaps.
  - id: REA-REQ-106
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      When the design has been running ≥ DEPTH cycles before arm,
      the captured window contains zero uninit-BRAM cells (no
      phantom zeros).
  - id: REA-REQ-107
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      On arm_pulse, overflow SHALL assert exactly when PRETRIG + POSTTRIG is
      greater than or equal to DEPTH (the requested window cannot fit), and
      SHALL clear for a subsequent legal arm or reset_pulse. STATUS[3] mirrors
      this generated FSM flag through the sample-to-JTAG CDC.

  # ── rr_rea_capture_fsm (cross-domain trigger, v0.2) ───────────────
  - id: REA-REQ-400
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "v0.2 — Cross-domain trigger crossbar (rr_rea_trig_xbar)" }]
    desc: >-
      An external trigger_in pulse on sample_clk fires the capture
      exactly like a local trigger_hit — triggered_r asserts and
      trig_ptr_r captures wr_ptr_r at the same cycle.
  - id: REA-REQ-401
    kind: negative
    spec: [{ doc: SPEC.md, clause: "v0.2 — Cross-domain trigger crossbar (rr_rea_trig_xbar)" }]
    desc: >-
      An external trigger_in pulse must NOT drive trigger_out_r
      (otherwise N coupled REA cores ping-pong forever). Only a
      local trigger_hit drives trigger_out_r.

  # ── External board-pin trigger (RTL-P3.266) ───────────────────────
  # Distinct from the trig_xbar trigger_in pulse above (REA-REQ-400/401):
  # ext_trigger_in is a package-pin input (synced in rr_rea_top) the user
  # routes from a board pin, gated by TRIG_MODE ext_en[3]/ext_and[8].
  - id: REA-REQ-410
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "External board-pin trigger (`TRIG_MODE` bit[3]/bit[8], RTL-P3.266)" }]
    desc: >-
      With TRIG_MODE ext_en[3]=1 and ext_and[8]=0 (OR mode), raising
      ext_trigger_in alone fires the capture even when the internal
      comparator never matches — fire on (internal hit) OR (ext pin).
  - id: REA-REQ-411
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "External board-pin trigger (`TRIG_MODE` bit[3]/bit[8], RTL-P3.266)" }]
    desc: >-
      With ext_en[3]=1 and ext_and[8]=1 (AND mode), a permanently-true
      internal comparator must NOT fire while ext_trigger_in is low, and
      MUST fire once the pin rises — fire only on (internal hit) AND (pin).
  - id: REA-REQ-412
    kind: negative
    spec: [{ doc: SPEC.md, clause: "External board-pin trigger (`TRIG_MODE` bit[3]/bit[8], RTL-P3.266)" }]
    desc: >-
      With ext_en[3]=0 the ext_trigger_in pin is ignored entirely — a
      pin held high must not fire the capture (the internal-only path is
      unchanged when the feature is off; back-compat).
  - id: REA-REQ-413
    kind: negative
    spec: [{ doc: SPEC.md, clause: "External board-pin trigger (`TRIG_MODE` bit[3]/bit[8], RTL-P3.266)" }]
    desc: >-
      In AND mode, `trigger_out` (the trig_xbar drive) pulses only on the
      true local fire (comparator AND ext_trigger_in both held) — never on
      the comparator alone, which by itself does not fire (no premature
      ping-pong of coupled cores).

  # ── rr_rea_trig_xbar (cross-domain crossbar, v0.2) ────────────────
  - id: REA-REQ-402
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "v0.2 — Cross-domain trigger crossbar (rr_rea_trig_xbar)" }]
    desc: >-
      A toggle on toggle_a_in produces exactly one pulse_b_out on
      clk_b within ≤4 dst-clock cycles, and vice versa for the
      reverse direction (toggle_b_in → pulse_a_out).

  # ── rr_rea_capture_fsm (decimation, v0.3) ─────────────────────────
  - id: REA-REQ-500
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      With decim_ratio_in=0, dpram_we fires every cycle (matches
      v0.1/v0.2 — no decimation). Sliding-window contract intact.
  - id: REA-REQ-501
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      With decim_ratio_in=N (N>0), dpram_we asserts on exactly one
      cycle per (N+1) sample-clock cycles. wr_ptr advances on each
      asserted cycle. post_count counts STORED samples (so the
      post-trigger window is posttrig_len_in stored cells regardless
      of decimation).

  # ── rr_rea_capture_fsm (comparator op modes, RTL-P3.644/645/646) ──
  # Single-comparator (legacy) path gains an op nibble in TRIG_MODE[7:4].
  # op=0 (EQ) is the historical masked-equality behaviour (no regression).
  - id: REA-REQ-610
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mixed-op AND comparator array (`TRIG_MODE` bit[2], RTL-P3.647)" }]
    desc: >-
      With trig_mode_in op=RISE (0x4), `triggered` fires on the cycle a
      masked probe_in bit transitions 0->1 relative to the previous sample
      (any bit under trig_mask_in). It does NOT fire on a steady-high
      probe held across cycles (only the transition edge fires).
  - id: REA-REQ-611
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mixed-op AND comparator array (`TRIG_MODE` bit[2], RTL-P3.647)" }]
    desc: >-
      With trig_mode_in op=FALL (0x5), `triggered` fires on a masked
      probe_in bit transitioning 1->0. It does NOT fire on a rising edge
      nor on a steady-low probe.
  - id: REA-REQ-620
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mixed-op AND comparator array (`TRIG_MODE` bit[2], RTL-P3.647)" }]
    desc: >-
      With trig_mode_in op=LT (0x2), `triggered` fires when the masked
      probe_in (unsigned) is strictly less than the masked trig_value_in.
      It does NOT fire on equality nor on greater-than.
  - id: REA-REQ-621
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mixed-op AND comparator array (`TRIG_MODE` bit[2], RTL-P3.647)" }]
    desc: >-
      With trig_mode_in op=GT (0x3), `triggered` fires when the masked
      probe_in (unsigned) is strictly greater than the masked trig_value_in.
      It does NOT fire on equality nor on less-than.
  - id: REA-REQ-630
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mixed-op AND comparator array (`TRIG_MODE` bit[2], RTL-P3.647)" }]
    desc: >-
      With trig_mode_in op=NE (0x1), `triggered` fires when the masked
      probe_in differs from the masked trig_value_in in ANY bit (multi-bit
      inequality). It does NOT fire when the masked fields are equal.

  # ── rr_rea_trig_seq (multi-stage sequencer, v0.3) ─────────────────
  - id: REA-REQ-600
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      With seq_enable_in=0 (default), the FSM honors the legacy
      trig_value_in / trig_mask_in comparator: a matching probe_in
      drives triggered identically to v0.1/v0.2 behavior.
      No regression on REA-REQ-100..106.
  - id: REA-REQ-601
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      With G_TRIG_STAGES=N and seq_enable=1, seq_state advances
      from K to K+1 only when stage K's local comparator (using
      seq_value_k, seq_mask_k, seq_mode_k against probe_in)
      matches. seq_state never advances on a stage-K+1 match
      while seq_state == K.
  - id: REA-REQ-602
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      The FINAL stage's local comparator match drives both
      triggered and trigger_out at the match cycle, then the
      post-trigger countdown runs unchanged.
  - id: REA-REQ-603
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      Each stage's seq_count_target_k, when non-zero, requires
      that many cumulative matches before advancing. seq_counter_k
      tracks the matches and resets when seq_state advances past
      stage K (or on arm_pulse).
  - id: REA-REQ-604
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      A non-final-stage match must NOT drive triggered or
      trigger_out. Only the final stage's match drives the
      capture trigger.
  - id: REA-REQ-605
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      An out-of-order probe_in pattern that matches a later
      stage's value while we're still on an earlier stage must
      NOT fire triggered. Only an in-order traversal advances
      the sequencer to the final stage.
  - id: REA-REQ-606
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Out of scope (parked)" }]
    desc: >-
      arm_pulse resets seq_state to 0 and clears all seq_counter_k
      registers. A new arm cycle restarts the sequence from
      stage 0 regardless of where the previous capture left it.
  - id: REA-REQ-607
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "SW Interface Contract (frozen — fcapz-compatible)" }]
    desc: >-
      Per-stage config maps at ADDR_SEQ_BASE = 0x0040 with stride
      20 bytes. wr_addr / wr_data writes to the SEQ_BASE address
      window must NOT alias into the v0.1/v0.2 RW slots
      (PRETRIG / POSTTRIG / TRIG_VALUE / TRIG_MASK / CHAN_SEL /
      DECIM); rd_addr at PRETRIG returns its written value
      regardless of intervening SEQ_BASE writes.
  - id: REA-REQ-608
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mixed-op AND comparator array (`TRIG_MODE` bit[2], RTL-P3.647)" }]
    desc: >-
      Per-condition comparator array (mixed-op AND, RTL-P3.647). When
      array_enable_in is set, the capture FSM ANDs every VALID condition
      slot: slot k applies its own op through cond_ops_in / cond_ops_out
      to its masked field (probe_in and cond_masks_in / cond_masks_out) vs
      cond_values_in / cond_values_out. `triggered` fires only when ALL
      valid slots match; an invalid slot does not block; an all-invalid
      array never fires (no free-fire on arm). array_enable_in=0 leaves
      the legacy single-comparator path unchanged; seq_enable takes
      precedence over array_enable_in.

  # ── Write-side SOURCE (ISSP-style, RTL-P2.837) ────────────────────
  # JTAG-writable control bit(s) driven INTO the design — the counterpart
  # to the read-only probe path. SOURCE register (0x3C) → low G_NUM_SOURCE
  # bits → rr_rea_sync_word (jtag_clk → sample_clk) → rr_rea_top.source_out.
  - id: REA-REQ-700
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Write-side source (`SOURCE` 0x3C, RTL-P2.837)" }]
    desc: >-
      source_out resets to all-zeros (every gated DUT signal held
      SAFE/inactive) and STAYS zero across a full trigger-config load, an
      arm pulse, and a reset pulse — nothing but an explicit SOURCE-register
      write releases it. Pins the no-auto-release contract: the gate must
      start closed so the operator can arm REA before releasing the DUT.
  - id: REA-REQ-701
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Write-side source (`SOURCE` 0x3C, RTL-P2.837)" }]
    desc: >-
      A JTAG write to SOURCE (0x3C) drives the low G_NUM_SOURCE bits onto
      source_out in the sample_clk domain within a few sample-clocks, having
      crossed jtag_clk → sample_clk through rr_rea_sync_word (two-flop
      ASYNC_REG sync); a clearing write re-gates it, and the register
      round-trips on JTAG readback (release → re-gate → full-width release).
  - id: REA-REQ-702
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Write-side source (`SOURCE` 0x3C, RTL-P2.837)" }]
    desc: >-
      Only the low G_NUM_SOURCE bits of the SOURCE register reach source_out.
      Bits above G_NUM_SOURCE are stored (round-trip on readback) but MUST
      NOT drive the port — the port width is the contract, guarding against a
      wide-slice bug leaking phantom control bits into the design.

  # ── rr_rea_top (integration) ──────────────────────────────────────
  - id: REA-REQ-300
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Mocking BSCAN" }]
    desc: >-
      Full end-to-end with mocked BSCAN — driving tdi / capture /
      shift_en / update / sel through the configure → arm → wait
      done → read sequence the fcapz host uses, the dpram readback
      via tdo matches a known sample-clock counter pattern.
  - id: REA-REQ-301
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      rr_rea_top SHALL NOT expose G_INPUT_PIPE_STAGES. A one-cycle `probe_in`
      trigger value MUST NOT bypass the internally-derived comparator stages;
      `triggered` SHALL assert only after the derived latency.
  - id: REA-REQ-302
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      rr_rea_capture_fsm SHALL NOT expose G_TRIGGER_PIPE_STAGES. A derived
      local fire SHALL preserve `trig_ptr_out` and pulse `trigger_out` once;
      an independent `trigger_in` pulse remains immediate and MUST NOT drive
      `trigger_out`.
  - id: REA-REQ-303
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Wide capture readback (`G_SAMPLE_W > 32`, RTL-P1.91)" }]
    desc: >-
      For every legal G_SAMPLE_W, the host SHALL reconstruct each captured
      sample exactly by reading DATA_BASE once per DATA_WORD_SEL bank in
      little-endian word order, masking unused bits in the partial final
      word, then restoring DATA_WORD_SEL to 0. G_SAMPLE_W<=32 SHALL perform
      the historical single read per cell without accessing the selector.

  # ── rr_rea trigger-pipeline decomposition (v0.6, RTL-P3.1165) ─────
  - id: REA-REQ-320
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      The local comparator pipeline stage count SHALL be internally derived,
      never supplied by a user-facing depth generic. C_SLICE_W is a FIXED
      internal constant (C_SLICE_W=8), not a generic: the compare/reduce
      structure (slice count, carry-chain depth, reduction fan-in) is
      generated against it, so exposing it would only spawn dead if-generate
      branches for a decision made at design time. With
      C_WIDTH_STAGES=ceil(G_SAMPLE_W/C_SLICE_W),
      C_REDUCE_STAGES=ceil_log2(G_TRIG_CONDS), and
      N=C_WIDTH_STAGES+C_REDUCE_STAGES. N is at least one. The implementation
      SHALL use exactly N registered compare/reduce stages for a local
      trigger decision and its sample tag. G_TRIG_STAGES does not contribute
      reduction depth: sequencer stages are an ordered state dependency, not
      a simultaneously-reduced fan-in. `triggered` exposes the resulting
      decision latency and `trig_ptr_out` exposes the accompanying tag.
  - id: REA-REQ-321
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      Each of the N local-comparator stages SHALL perform comparator-tree
      decomposition, not a decision-only shift: a stage compares or carries
      forward at most C_SLICE_W (=8) masked probe bits per field and registers
      its partial result; each condition aggregation level is a registered
      binary reduction. Post-synthesis netlist plus STA review
      SHALL demonstrate that every register-to-register trigger-decision-cone
      path crosses no more than one C_SLICE_W-wide field comparison and one
      binary reduction level. Arbitrary output-only delay stages fail this
      requirement; registered transport of later slice operands and alignment
      of non-array modes across condition-reduction stages are permitted
      because every derived stage performs compare/reduce work in an active
      trigger mode. `triggered` is the observable end of this decision cone.
  - id: REA-REQ-322
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      For every derived N, when the local comparator accepts sample S,
      trig_ptr_out and DPRAM readback SHALL identify S, irrespective of the
      later cycle on which the pipelined decision is reported. The tag that
      accompanies every partial result SHALL be the write pointer associated
      with S, preserving REA-REQ-102 and REA-REQ-103.
  - id: REA-REQ-323
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      G_INPUT_PIPE_STAGES and G_TRIGGER_PIPE_STAGES SHALL be removed from
      the user-facing rr_rea_top and rr_rea_capture_fsm generic interfaces.
      The narrowest configuration (G_SAMPLE_W<=C_SLICE_W, G_TRIG_CONDS=1,
      sequencer disabled) derives N=1 and matches today's zero-to-one-stage
      behaviour exactly; for every wider derived N the design SHALL preserve
      the current captured-window semantics with no functional regression
      against REA-REQ-100..106 and REA-REQ-300..302, the added report latency
      (N>1) being invisible to the capture result by REA-REQ-322 and
      REA-REQ-325. `triggered` SHALL preserve the one-stage narrow behavior.
  - id: REA-REQ-324
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      No user-facing pipeline-depth generic SHALL remain. The existing scalar
      ext_trigger_in board-pin input and trigger_in crossbar pulse SHALL NOT
      alter N or the internal comparator decomposition. Their external-trigger
      behaviour remains subject to REA-REQ-400, REA-REQ-401, and
      REA-REQ-410..413; adding a multi-input external-trigger interface is a
      separate API/CDC contract, not part of internal comparator pipelining.
  - id: REA-REQ-325
    kind: negative
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      Increasing N through G_SAMPLE_W or G_TRIG_CONDS SHALL
      NOT change which sampled probe value satisfies a local trigger condition;
      it may change only the cycle on which the decision is reported. It SHALL
      NOT introduce a trigger-sample offset in trig_ptr_out or DPRAM readback.

  # ── trigger-pipeline decomposition — per-slice token + sequencer (RTL-P3.1167) ──
  # Locks the two algorithm decisions the RTL author needs (design-doc open
  # questions 1 & 3): how EVERY op decomposes across width-slices, and how the
  # sequencer runs when comparator results are pipeline-delayed.
  - id: REA-REQ-326
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      The width-slice decomposition SHALL carry a UNIFORM per-slice comparison
      token so every comparator op decomposes through the same registered
      reduction tree, not just equality. Each C_SLICE_W-wide masked field-slice
      emits a lexicographic 3-state token {eq, gt, lt}; two nodes combine
      ASSOCIATIVELY as eq = eq_hi and eq_lo; gt = gt_hi or (eq_hi and gt_lo);
      lt = lt_hi or (eq_hi and lt_lo) — a monoid, hence a registered
      C_WIDTH_STAGES slice chain. At the root EQ=eq, NE=not eq, GT=gt, LT=lt
      (masked-unsigned, matching REA-REQ-610/611/620/621/630). RISE/FALL ride
      alongside as a per-slice edge bit (masked cur and not prev for RISE; masked
      prev and not cur for FALL, from a registered previous sample) reduced by
      OR. Each accumulator stage crosses at most one C_SLICE_W-wide slice
      comparison/combine; the separate condition tree crosses one binary
      reduction level per stage (REA-REQ-321), with `triggered` exposing the
      final token decision.
  - id: REA-REQ-327
    kind: behavioral
    spec: [{ doc: SPEC.md, clause: "Capture FSM contract (the core fix)" }]
    desc: >-
      ALL local comparator paths — the legacy single comparator, the
      G_TRIG_CONDS array, and EACH sequencer stage's local comparator — SHALL be
      decomposed through the SAME N-stage pipeline, so matches emerge in the same
      sample order they entered, delayed by a uniform N, each carrying its
      sample's wr_ptr tag (REA-REQ-322). The sequencer FSM (seq_state advance,
      per-stage seq_count_target, arm reset — REA-REQ-601..606) SHALL run on this
      order-preserved, delayed match stream: a later sample's match MUST NOT
      advance or fire a stage before an earlier sample's result is consumed.
      Because the pipeline only adds uniform latency (never reordering), the
      captured window, the selected sample and the pointer tag are identical to
      the combinational design (REA-REQ-325); only the `triggered` report cycle
      moves.
